<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>皮克敏助手</title>

<link href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;700;900&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #4caf6e; --green-dark: #2a7a45; --green-light: #e8f5ee;
    --pink: #ff8fb1; --pink-dark: #d94f6e; --pink-light: #fff0f5;
    --dark: #1a2e1f; --sub: #7a9e82;
    --red-alert: #e53935;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  html { overflow-x:hidden; background:#c8f0ff; }
  body { overflow-x:hidden; max-width:100vw; }
  body {
    font-family: 'Nunito', sans-serif;
    background: linear-gradient(180deg,#c8f0ff 0%,#e8f8e0 60%,#b5d98a 100%);
    min-height:100vh; display:flex; flex-direction:column; align-items:center;
    padding:0 0 80px; overflow-x:hidden;
  }
  .header { width:100%; max-width:480px; padding:28px 16px 0; display:flex; flex-direction:column; align-items:center; }
  h1 { font-size:1.9rem; font-weight:900; color:var(--dark); text-shadow:0 2px 0 rgba(255,255,255,0.6); margin-bottom:16px; }
  .tabs { display:flex; gap:10px; margin-bottom:20px; }
  .tab {
    border:none; border-radius:50px; padding:11px 24px;
    font-size:0.95rem; font-weight:900; font-family:'Nunito',sans-serif;
    cursor:pointer; background:rgba(255,255,255,0.55); color:var(--sub);
    box-shadow:0 2px 8px rgba(0,0,0,0.06); transition:all 0.18s;
  }
  .tab.active { background:var(--green); color:#fff; box-shadow:0 4px 0 var(--green-dark),0 6px 16px rgba(76,175,110,0.3); }
  .page { display:none; width:100%; max-width:480px; padding:0 16px; overflow-x:hidden; }
  .page.active { display:flex; flex-direction:column; align-items:center; }

  /* ── Timer ── */
  .add-btn {
    background:var(--green); color:#fff; border:none; border-radius:50px;
    padding:15px 20px; font-size:1.05rem; font-weight:900; font-family:'Nunito',sans-serif;
    cursor:pointer; box-shadow:0 4px 0 var(--green-dark),0 8px 20px rgba(76,175,110,0.3);
    transition:transform 0.1s,box-shadow 0.1s;
    display:flex; align-items:center; gap:8px; margin-bottom:20px; width:90%; justify-content:center;
  }
  .add-btn:active { transform:translateY(3px); box-shadow:0 1px 0 var(--green-dark); }
  .flower-icon { font-size:1.3rem; animation:spin 4s linear infinite; display:inline-block; }
  @keyframes spin { to { transform:rotate(360deg); } }
  .list { width:100%; display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .card {
    border-radius:20px; padding:16px 18px;
    box-shadow:0 4px 16px rgba(0,0,0,0.07);
    display:flex; flex-direction:column; gap:10px;
    animation:popIn 0.28s cubic-bezier(0.34,1.56,0.64,1);
    border:2px solid rgba(168,230,184,0.5);
    background:rgba(255,255,255,0.88); backdrop-filter:blur(8px);
    position:relative; overflow:hidden;
  }
  .card.idle { opacity:0.8; }
  .card.running { border-color:rgba(76,175,110,0.7); }
  .card.expired { background:rgba(255,240,245,0.95); border-color:var(--pink); }
  .card.expired::before {
    content:''; position:absolute; top:0; left:0; right:0; height:3px;
    background:linear-gradient(90deg,var(--pink),var(--pink-dark),var(--pink));
    animation:shimmer 1.5s infinite;
  }
  @keyframes shimmer{0%,100%{opacity:1}50%{opacity:0.4}}
  @keyframes popIn{from{transform:scale(0.75) translateY(16px);opacity:0}to{transform:scale(1);opacity:1}}
  .card-top { display:flex; align-items:center; justify-content:space-between; }
  .card-name {
    font-size:0.82rem; font-weight:900; color:var(--dark); cursor:pointer; user-select:none;
    text-decoration:underline dotted #b8d8c4; text-underline-offset:3px;
  }
  .card-name:hover { color:var(--green); }
  .card-note { font-size:0.75rem; font-weight:700; color:#a0b8a8; margin-left:8px; }
  .seed-icon { font-size:1rem; cursor:pointer; padding:2px 4px; border-radius:6px; flex-shrink:0; opacity:0.5; transition:opacity 0.15s; }
  .seed-icon:hover { opacity:1; }
  .seed-icon.has-img { opacity:1; }
  .seed-img-overlay {
    position:fixed; inset:0; background:rgba(0,0,0,0.7);
    display:flex; align-items:center; justify-content:center; z-index:200;
  }
  .seed-img-box {
    background:#fff; border-radius:20px; padding:16px;
    max-width:320px; width:90%; display:flex; flex-direction:column; gap:12px;
    box-shadow:0 16px 48px rgba(0,0,0,0.3);
  }
  .seed-img-box img { width:100%; border-radius:12px; max-height:300px; object-fit:contain; }
  .card.expired .card-name { color:var(--pink-dark); text-decoration-color:var(--pink); }
  .card-right { display:flex; align-items:center; gap:6px; }
  .badge {
    background:var(--pink); color:#fff; font-size:0.6rem; font-weight:900;
    border-radius:8px; padding:3px 8px; animation:pulse 1s infinite alternate;
    display:inline-flex; flex-direction:column; align-items:center; line-height:1.4;
  }
  @keyframes pulse{from{opacity:1}to{opacity:0.45}}
  .btn-del { background:none; border:none; color:#ccc; font-size:0.95rem; cursor:pointer; padding:2px 4px; }
  .btn-del:hover { color:var(--pink-dark); }
  .card-times { display:flex; flex-direction:column; gap:1px; font-size:0.62rem; color:var(--sub); }
  .card-times .tval { font-weight:700; color:#444; }
  .card-times .idle-hint { color:#bbb; font-style:italic; }
  .progress-bar { width:100%; height:7px; background:#e0f0e5; border-radius:99px; overflow:hidden; }
  .progress-fill { height:100%; border-radius:99px; background:linear-gradient(90deg,#a8e6b8,var(--green)); transition:width 1s linear; }
  .card.expired .progress-fill { background:linear-gradient(90deg,var(--pink),var(--pink-dark)); }
  .card-bottom { display:flex; align-items:center; justify-content:space-between; }
  .countdown { font-size:1.05rem; font-weight:900; color:var(--green); letter-spacing:0; }
  .countdown.soon { color:#ff7043; }
  .countdown.idle { color:#ccc; font-size:0.85rem; }
  .card.expired .countdown { color:var(--pink-dark); }
  .btn-action {
    border-radius:50px; padding:6px 10px; font-size:0.72rem; font-weight:900;
    font-family:'Nunito',sans-serif; cursor:pointer; border:none; transition:transform 0.1s;
  }
  .btn-action:active { transform:scale(0.94); }
  .btn-start { background:var(--green); color:#fff; box-shadow:0 3px 0 var(--green-dark); }
  .btn-end { background:#f0f4f1; color:#8aaa96; border:2px solid #d4e0d8; font-size:0.78rem; }
  .btn-restart { background:var(--pink-light); color:var(--pink-dark); border:2px solid var(--pink); }
  .empty { text-align:center; color:#8aaa80; font-size:0.95rem; padding:32px; font-weight:700; width:100%; grid-column:1/-1; }


  /* ── Inventory ── */
  /* Alert box */
  .alert-box {
    width:100%; background:rgba(255,255,255,0.9); border-radius:18px;
    border:2px solid var(--pink); padding:14px 16px; margin-bottom:16px;
    box-shadow:0 4px 14px rgba(255,143,177,0.2);
  }
  .alert-title { font-size:0.82rem; font-weight:900; color:var(--pink-dark); margin-bottom:8px; display:flex; align-items:center; gap:6px; }
  .alert-items { display:flex; flex-wrap:wrap; gap:6px; }
  .alert-tag {
    background:var(--pink-light); border:1.5px solid var(--pink);
    border-radius:99px; padding:3px 10px; font-size:0.72rem; font-weight:700;
    color:var(--pink-dark); display:flex; align-items:center; gap:4px;
  }
  .alert-dot { width:10px; height:10px; border-radius:50%; flex-shrink:0; }
  .alert-none { font-size:0.78rem; color:#b0c8b4; font-style:italic; }

  .inv-search-wrap { width:100%; margin-bottom:12px; }
  .inv-search {
    width:100%; border:1.5px solid rgba(168,230,184,0.8); border-radius:50px;
    padding:10px 18px; font-size:16px; font-family:'Nunito',sans-serif;
    background:rgba(255,255,255,0.7); color:var(--dark); outline:none;
  }
  .inv-search:focus { border-color:var(--green); background:#fff; }
  .inv-search::placeholder { color:#b0c8b4; }

  #inv-list { width:100%; }

  /* ── Style B: name on left, colors on right, full row ── */
  .styleB-block { margin-bottom:8px; }
  .styleB-row {
    background:rgba(255,255,255,0.88); backdrop-filter:blur(8px);
    border-radius:14px; padding:10px 12px;
    box-shadow:0 3px 10px rgba(0,0,0,0.07);
    border:2px solid rgba(168,230,184,0.4);
    display:flex; align-items:center; gap:10px;
  }
  .styleB-name { font-size:0.8rem; font-weight:900; color:var(--dark); min-width:60px; flex-shrink:0; }
  .styleB-colors { display:flex; gap:6px; flex:1; flex-wrap:nowrap; overflow-x:auto; }
  .styleB-color-card {
    display:flex; align-items:center; gap:5px;
    background:#f8fbf8; border-radius:10px; padding:6px 8px;
    cursor:pointer; border:1.5px solid #e0ece2; transition:transform 0.12s;
    flex-shrink:0;
  }
  .styleB-color-card:active { transform:scale(0.93); }
  .styleB-dot { width:14px; height:14px; border-radius:50%; border:2px solid rgba(0,0,0,0.08); flex-shrink:0; }
  .styleB-nums { display:flex; flex-direction:column; gap:1px; }
  .styleB-num-row { display:flex; align-items:center; gap:3px; }
  .styleB-num-type { font-size:0.5rem; color:#aac0ae; font-weight:700; width:26px; }
  .styleB-num { font-size:0.82rem; font-weight:900; color:var(--dark); line-height:1.2; }
  .styleB-num.low { color:var(--red-alert); }

  /* color classes */
  .fc-white  { background:#f5f5f5; }
  .border-white  { border-color:#ddd !important; }
  .border-yellow { border-color:#ffd740 !important; }
  .border-red    { border-color:#ff5252 !important; }
  .border-blue   { border-color:#448aff !important; }
  .fill-white  { background:#f0f0f0 !important; }
  .fill-yellow { background:#fff8d6 !important; }
  .fill-red    { background:#ffe5e5 !important; }
  .fill-blue   { background:#e5eeff !important; }
  .fc-yellow { background:#ffd740; }
  .fc-red    { background:#ff5252; }
  .fc-blue   { background:#448aff; }

  /* ── Modals ── */
  .modal-overlay {
    position:fixed; inset:0; background:rgba(20,40,24,0.4);
    backdrop-filter:blur(5px); display:flex; align-items:center; justify-content:center; z-index:100;
    -webkit-overflow-scrolling:touch;
  }
  .modal {
    background:#fff; border-radius:24px; padding:26px 22px 20px;
    width:300px; box-shadow:0 16px 48px rgba(0,0,0,0.15);
    display:flex; flex-direction:column; gap:14px;
    animation:popIn 0.25s cubic-bezier(0.34,1.56,0.64,1);
  }
  .modal-title { font-size:1.05rem; font-weight:900; color:var(--dark); text-align:center; width:100%; }
  .modal-sub { text-align:center; font-size:0.8rem; color:var(--sub); margin-top:-8px; }
  .modal-label { font-size:0.75rem; font-weight:700; color:var(--sub); margin-bottom:5px; }
  .modal-input {
    width:100%; border:1.5px solid #d4ead9; border-radius:12px;
    padding:10px 13px; font-size:16px; font-family:'Nunito',sans-serif;
    font-weight:700; color:var(--dark); outline:none;
  }
  .modal-input:focus { border-color:var(--green); }
  .time-row { display:flex; gap:8px; align-items:center; }
  .time-input {
    flex:1; border:1.5px solid #d4ead9; border-radius:12px;
    padding:10px 8px; font-size:1.3rem; font-family:'Nunito',sans-serif;
    font-weight:900; color:var(--dark); outline:none; text-align:center;
    background:#f8fbf8; -moz-appearance:textfield;
  }
  .time-input::-webkit-outer-spin-button,.time-input::-webkit-inner-spin-button { -webkit-appearance:none; }
  .time-input:focus { border-color:var(--green); }
  .time-colon { font-size:1.4rem; font-weight:900; color:var(--dark); }
  .modal-hint { font-size:0.7rem; color:#b0bdb3; text-align:center; margin-top:-6px; }
  .modal-btns { display:flex; gap:8px; }
  .modal-btns button {
    flex:1; padding:12px; border-radius:12px; border:none;
    font-size:0.95rem; font-weight:900; font-family:'Nunito',sans-serif; cursor:pointer;
  }
  .mbtn-cancel { background:#f0f2f0; color:#8a9a8e; }
  .mbtn-confirm { background:var(--green); color:#fff; box-shadow:0 3px 0 var(--green-dark); }
  .mbtn-confirm:active { transform:translateY(2px); box-shadow:none; }
  .inv-edit-preview { display:flex; align-items:center; justify-content:center; gap:10px; }
  .inv-edit-dot { width:22px; height:22px; border-radius:50%; border:2px solid rgba(0,0,0,0.1); }
  .inv-edit-name { font-size:0.9rem; font-weight:700; color:var(--dark); }
  .inv-edit-fields { display:flex; gap:12px; }
  .inv-edit-field { flex:1; display:flex; flex-direction:column; gap:5px; }
  .num-input {
    width:100%; border:1.5px solid #d4ead9; border-radius:12px;
    padding:10px 6px; font-size:1.4rem; font-family:'Nunito',sans-serif;
    font-weight:900; color:var(--dark); outline:none; text-align:center;
    -moz-appearance:textfield;
  }
  .num-input::-webkit-outer-spin-button,.num-input::-webkit-inner-spin-button { -webkit-appearance:none; }
  .num-input:focus { border-color:var(--green); }
  .filter-tabs { display:flex; gap:6px; margin-bottom:14px; width:100%; flex-wrap:wrap; }
  .filter-tab {
    border:1.5px solid rgba(168,230,184,0.8); border-radius:50px; padding:6px 12px;
    font-size:0.75rem; font-weight:900; font-family:'Nunito',sans-serif;
    cursor:pointer; background:rgba(255,255,255,0.6); color:var(--sub);
    transition:all 0.15s;
  }
  .filter-tab.active { background:var(--green); color:#fff; border-color:var(--green); }
  @keyframes flashBlock {
    0%,100% { box-shadow: none; background: rgba(255,255,255,0.88); border-radius: 14px; }
    50% { box-shadow: 0 0 0 4px rgba(255,140,170,0.75); background: rgba(255,200,215,0.65); border-radius: 14px; }
  }
  .flash { animation: flashBlock 1.1s ease 3; border-radius: 14px; }
  .back-top {
    position: fixed; bottom: 24px; right: 16px; z-index: 50;
    width: 40px; height: 40px; border-radius: 50%;
    background: var(--green); color: #fff; border: none;
    font-size: 1.1rem; cursor: pointer;
    box-shadow: 0 4px 12px rgba(76,175,110,0.4);
    display: flex; align-items: center; justify-content: center;
    opacity: 0; pointer-events: none;
    transition: opacity 0.25s;
  }
  .back-top.visible { opacity: 1; pointer-events: auto; }

  .color-toggle {
    width:28px; height:28px; border-radius:50%; border:3px solid transparent;
    cursor:pointer; transition:all 0.15s; opacity:0.3; flex-shrink:0;
  }
  .color-toggle.selected { opacity:1; border-color:var(--dark); }
  .edit-mode-tab {
    flex:1; border:1.5px solid #d4ead9; border-radius:50px; padding:7px 4px;
    font-size:0.72rem; font-weight:900; font-family:'Nunito',sans-serif;
    cursor:pointer; background:#f8fbf8; color:var(--sub); text-align:center;
    transition:all 0.15s;
  }
  .edit-mode-tab.active { background:var(--green); color:#fff; border-color:var(--green); }

<div class="header"><div style="position:relative;width:100%;text-align:center;margin-bottom:16px;"><h1 style="margin-bottom:0;display:inline-block;">皮克敏助手</h1><span style="font-size:0.7rem;font-weight:700;color:#8aaa80;letter-spacing:1px;position:absolute;bottom:2px;margin-left:6px;">@Rita小蝦米製作</span></div></div>

<div class="tabs">
  <button class="tab active" onclick="switchTab('timer')">⏱ 種花計時</button>
  <button class="tab" onclick="switchTab('inv')">🌼 花種庫存</button>
  <button class="tab" onclick="switchTab('coord')">📍 座標分析</button>
</div>

<!-- Coord page -->
<div class="page" id="page-coord">
  <div style="width:100%;display:flex;flex-direction:column;gap:12px;">
    <div style="background:rgba(255,255,255,0.88);backdrop-filter:blur(8px);border-radius:20px;padding:18px;border:2px solid rgba(168,230,184,0.5);box-shadow:0 4px 16px rgba(0,0,0,0.07);">
      <div style="font-size:0.75rem;font-weight:900;color:var(--sub);margin-bottom:10px;">📍 輸入座標</div>
      <input class="modal-input" id="coord-input" placeholder="輸入座標，例：23.9769, 121.6044" style="font-size:16px;margin-bottom:10px;" autocomplete="off">
      <button class="btn-action btn-start" style="width:auto;padding:8px 24px;align-self:center;" onclick="analyzeCoord()">🔍 分析</button>
    </div>
    <div id="coord-result" style="display:none;background:rgba(255,255,255,0.88);backdrop-filter:blur(8px);border-radius:20px;padding:18px;border:2px solid rgba(168,230,184,0.5);box-shadow:0 4px 16px rgba(0,0,0,0.07);">
      <div style="font-size:0.75rem;font-weight:900;color:var(--sub);margin-bottom:8px;">🌍 分析結果</div>
      <div id="coord-result-text" style="font-size:0.9rem;color:var(--dark);line-height:1.7;white-space:pre-wrap;"></div>
    </div>
    <div id="coord-loading" style="display:none;text-align:center;padding:20px;color:var(--sub);font-weight:700;font-size:0.9rem;">
      🌸 分析中，請稍候…
    </div>
  </div>
</div>

<!-- Timer page -->
<div class="page active" id="page-timer">
  <button class="add-btn" onclick="openAddModal()">
    <span class="flower-icon">🌸</span> 小花農出發 <span class="flower-icon">🌸</span>
  </button>
  <div style="display:flex;gap:8px;width:100%;margin-bottom:14px;align-items:center;">
    <input class="inv-search" id="timer-search" placeholder="🔍" oninput="renderAll()" style="margin-bottom:0;flex:1;">
    <div class="filter-tabs" style="margin-bottom:0;flex-wrap:nowrap;width:auto;">
    <button class="filter-tab active" onclick="setFilter('all',this)">全部</button>
    <button class="filter-tab" onclick="setFilter('running',this)">進行中</button>
    <button class="filter-tab" onclick="setFilter('soon',this)">快到了</button>
    <button class="filter-tab" onclick="setFilter('idle',this)">未開始</button>
    <button class="filter-tab" onclick="setFilter('expired',this)">已結束</button>
    </div>
  </div>
  <div class="list" id="list">
    <div class="empty" id="empty">還沒有任何地點<br>點上方按鈕新增！</div>
  </div>
</div>

<!-- Inventory page -->
<div class="page" id="page-inv">
  <div class="alert-box" id="alert-box">
    <div class="alert-title">🌱 花瓣告急！！該補花囉～</div>
    <div class="alert-items" id="alert-items"><span class="alert-none">目前庫存充足，不需補貨！</span></div>

/* ── Tab ── */
function switchTab(tab){
  document.querySelectorAll('.tab').forEach((t,i)=>t.classList.toggle('active',(i===0&&tab==='timer')||(i===1&&tab==='inv')||(i===2&&tab==='coord')));
  document.getElementById('page-timer').classList.toggle('active',tab==='timer');
  document.getElementById('page-inv').classList.toggle('active',tab==='inv');
  document.getElementById('page-coord').classList.toggle('active',tab==='coord');
  if(tab==='inv'){ renderAlert(); renderInv(); }
}

/* ── Timer ── */
const DURATION=23*60*60*1000;
let items=JSON.parse(localStorage.getItem('pikmin_v4')||'null');
if(!items||items.length===0){items=[{"id": 1779444000000, "name": "捷運站", "note": "", "start": 1779444000000}, {"id": 1779501600000, "name": "公園", "note": "", "start": 1779501600000}, {"id": 1779537660000, "name": "遊樂園", "note": "", "start": null}];save();}
let editingId=null;
function save(){ localStorage.setItem('pikmin_v4',JSON.stringify(items)); }

function openAddModal(){ document.getElementById('add-modal').style.display='flex'; setTimeout(()=>document.getElementById('add-name').focus(),80); }
function closeModal(id){
  document.getElementById(id).style.display='none';
  if(id==='add-modal') document.getElementById('add-name').value='';
  if(id==='edit-modal') editingId=null;
  if(id==='inv-modal') invEditing=null;
}
function closeOutside(e,id){ if(e.target===document.getElementById(id)) closeModal(id); }
function confirmAdd(){
  const name=document.getElementById('add-name').value.trim(); if(!name) return;
  items.push({id:Date.now(),name,start:null}); save(); renderAll(); closeModal('add-modal');
}
let editMode='start';
let currentFilter='all';
function setFilter(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-tab').forEach(t=>t.classList.remove('active'));
  btn.classList.add('active');
  renderAll();
}
function switchEditMode(mode){
  editMode=mode;
  document.getElementById('tab-start').classList.toggle('active',mode==='start');
  document.getElementById('tab-remain').classList.toggle('active',mode==='remain');
  document.getElementById('mode-start').style.display=mode==='start'?'block':'none';
  document.getElementById('mode-remain').style.display=mode==='remain'?'block':'none';
}
function openEdit(id){
  const item=items.find(i=>i.id===id); if(!item) return;
  editingId=id;
  document.getElementById('edit-name-input').value=item.name;
  const d=item.start?new Date(item.start):new Date();
  document.getElementById('edit-hour').value=d.getHours();
  document.getElementById('edit-min').value=d.getMinutes();
  document.getElementById('remain-hour').value='';
  document.getElementById('remain-min').value='';
  document.getElementById('edit-note').value=item.note||'';
  switchEditMode('start');
  document.getElementById('edit-modal').style.display='flex';
  setTimeout(()=>document.getElementById('edit-hour').focus(),80);
}
function confirmEdit(){
  const item=items.find(i=>i.id===editingId); if(!item){closeModal('edit-modal');return;}
  if(editMode==='start'){
    let h=parseInt(document.getElementById('edit-hour').value);
    let m=parseInt(document.getElementById('edit-min').value);
    if(isNaN(h)||isNaN(m)){closeModal('edit-modal');return;}
    h=Math.min(23,Math.max(0,h)); m=Math.min(59,Math.max(0,m));
    const d=new Date(); d.setHours(h,m,0,0);
    if(d.getTime()>Date.now()) d.setDate(d.getDate()-1);
    item.start=d.getTime();
  } else {
    let rh=parseInt(document.getElementById('remain-hour').value)||0;
    let rm=parseInt(document.getElementById('remain-min').value)||0;
    rh=Math.min(23,Math.max(0,rh)); rm=Math.min(59,Math.max(0,rm));
    const remainMs=(rh*60+rm)*60*1000;
    item.start=Date.now()-DURATION+remainMs;
  }
  const newName=document.getElementById('edit-name-input').value.trim();
  if(newName) item.name=newName;
  item.note=document.getElementById('edit-note').value.trim();
  save(); renderAll(); closeModal('edit-modal');
}
function startTimer(id){ const item=items.find(i=>i.id===id); if(item){item.start=Date.now();save();renderAll();} }
function endTimer(id){
  const btn=document.getElementById('end-'+id);
  if(!btn) return;
  const item=items.find(i=>i.id===id);
  if(!item) return;
  if(btn.dataset.clicks==='1'){
    item.start=null; item.note=''; save(); renderAll();
  } else {
    btn.dataset.clicks='1';
    btn.style.opacity='0.5';
    setTimeout(()=>{ if(btn&&btn.dataset.clicks==='1'){btn.dataset.clicks='';btn.style.opacity='';} },1500);
  }
}
function deleteItem(id){
  const btn=document.getElementById('del-'+id);
  if(!btn) return;
  if(btn.dataset.confirm==='1'){
    items=items.filter(i=>i.id!==id); save(); renderAll();
  } else {
    btn.dataset.confirm='1';
    btn.style.color='var(--pink-dark)';
    btn.style.fontWeight='900';
    btn.textContent='確認刪除';
    btn.style.fontSize='0.65rem';
    btn.style.background='var(--pink-light)';
    btn.style.border='1.5px solid var(--pink)';
    btn.style.borderRadius='8px';
    btn.style.padding='3px 7px';
    setTimeout(()=>{
      if(btn&&btn.dataset.confirm==='1'){
        btn.dataset.confirm='';
        btn.style.cssText='';
        btn.textContent='✕';
      }
    },3000);
  }
}

function fmt(ts){
  const d=new Date(ts);
  return `${d.getMonth()+1}/${d.getDate()} ${String(d.getHours()).padStart(2,'0')}:${String(d.getMinutes()).padStart(2,'0')}`;
}
function fmtCd(ms){
  const h=Math.floor(ms/3600000),m=Math.floor((ms%3600000)/60000),s=Math.floor((ms%60000)/1000);
  return `${String(h).padStart(2,'0')}:${String(m).padStart(2,'0')}:${String(s).padStart(2,'0')}`;
}
function renderAll(){
  const list=document.getElementById('list'),empty=document.getElementById('empty');
  [...list.querySelectorAll('.card-wrap')].forEach(el=>el.remove());
  empty.style.display=items.length===0?'block':'none';
  const q=document.getElementById('timer-search')&&document.getElementById('timer-search').value.trim();
  const now=Date.now();
  const sorted=[...items].sort((a,b)=>{
    const stateOf=i=>{
      if(i.start===null) return 3;
      const r=i.start+DURATION-now;
      if(r<=0) return 0;
      if(r<3*60*60*1000) return 1;
      return 2;
    };
    const sa=stateOf(a), sb=stateOf(b);
    if(sa!==sb) return sa-sb;
    if(sa===1||sa===2){
      const ra=a.start+DURATION-now, rb=b.start+DURATION-now;
      return ra-rb;
    }
    return 0;
  });
  const filtered=sorted.filter(item=>{
    if(q&&!item.name.includes(q)) return false;
    const idle=item.start===null;
    const remaining=idle?null:item.start+DURATION-now;
    const expired=!idle&&remaining<=0;
    const running=!idle&&!expired;
    const soon=running&&remaining<3*60*60*1000;
    if(currentFilter==='idle') return idle;
    if(currentFilter==='running') return running&&!soon;
    if(currentFilter==='soon') return soon;
    if(currentFilter==='expired') return expired;
    return true;
  });
  filtered.forEach(item=>{
    const wrap=document.createElement('div'); wrap.className='card-wrap'; wrap.id='wrap-'+item.id;
    const idle=item.start===null;
    const remaining=idle?null:item.start+DURATION-now;
    const expired=!idle&&remaining<=0;
    const cardCls=idle?'card idle':expired?'card expired':'card running';
    const cdHTML=idle?`<div class="countdown idle">——</div>`
      :expired?`<span class="badge" style="text-align:center;">🌱<br>變種子了</span>`
      :`<div class="countdown" id="cd-${item.id}">${fmtCd(remaining)}</div>`;
    const metaHTML=idle
      ?`<span class="idle-hint">未種花</span>`
      :`<span>開花 <span class="tval">${fmt(item.start)}</span></span><span>變回葉子 <span class="tval">${fmt(item.start+DURATION)}</span></span>`;
    const badge='';
    const btnHTML=idle
      ?`<button class="btn-action btn-start" onclick="startTimer(${item.id})">▶ 開始</button>`
      :expired?`<button class="btn-action btn-end" id="end-${item.id}" onclick="endTimer(${item.id})">■ 結束</button>`
      :`<button class="btn-action btn-end" id="end-${item.id}" onclick="endTimer(${item.id})">■ 結束</button>`;
    const pct=idle?0:expired?100:Math.min(100,(1-remaining/DURATION)*100);
    wrap.innerHTML=`
      <div class="${cardCls}" id="card-${item.id}">
        ${badge}
        <div class="card-top">
          <div class="card-name" onclick="openEdit(${item.id})">${item.name}${item.note?`<span class="card-note">${item.note}</span>`:''}</div>
          <div class="card-right"><button class="btn-del" id="del-${item.id}" onclick="deleteItem(${item.id})">✕</button></div>
        </div>
        <div style="display:flex;align-items:center;justify-content:space-between;">
          <div class="card-times" style="flex:1;">${metaHTML}</div>
          <div class="seed-icon${item.seedImg?' has-img':''}" onclick="openSeedImg(event,${item.id})" title="${item.seedImg?'查看圖片':'新增圖片'}">🌱</div>
        </div>
        <div class="progress-bar"><div class="progress-fill" id="bar-${item.id}" style="width:${pct}%"></div></div>
        <div class="card-bottom">${cdHTML}${btnHTML}</div>
      </div>`;
    list.appendChild(wrap);
  });
}
function tick(){
  const q=document.getElementById('timer-search')&&document.getElementById('timer-search').value.trim();
  const now=Date.now();
  const sorted=[...items].sort((a,b)=>{
    const stateOf=i=>{
      if(i.start===null) return 3;
      const r=i.start+DURATION-now;
      if(r<=0) return 0;
      if(r<3*60*60*1000) return 1;
      return 2;
    };
    const sa=stateOf(a), sb=stateOf(b);
    if(sa!==sb) return sa-sb;
    if(sa===1||sa===2){
      const ra=a.start+DURATION-now, rb=b.start+DURATION-now;
      return ra-rb;
    }
    return 0;
  });
  const filtered=sorted.filter(item=>{
    if(q&&!item.name.includes(q)) return false;
    const idle=item.start===null;
    const remaining=idle?null:item.start+DURATION-now;
    const expired=!idle&&remaining<=0;
    const running=!idle&&!expired;
    const soon=running&&remaining<3*60*60*1000;
    if(currentFilter==='idle') return idle;
    if(currentFilter==='running') return running&&!soon;
    if(currentFilter==='soon') return soon;
    if(currentFilter==='expired') return expired;
    return true;
  });
  filtered.forEach(item=>{
    if(!item.start) return;
    const remaining=item.start+DURATION-now;
    const cd=document.getElementById('cd-'+item.id);
    const bar=document.getElementById('bar-'+item.id);
    const card=document.getElementById('card-'+item.id);
    if(!cd) return;
    if(remaining<=0){ if(!card.classList.contains('expired')) renderAll(); else bar.style.width='100%'; }
    else { cd.textContent=fmtCd(remaining); bar.style.width=Math.min(100,(1-remaining/DURATION)*100)+'%'; if(remaining<3*60*60*1000) cd.classList.add('soon'); else cd.classList.remove('soon'); }
  });
}

function getInv(name,color,type){ const v=inv[`${name}_${color}_${type}`]; return v===undefined?300:v; }

function getLowItems(){
  const low=[];
  [...customFlowers,...FLOWERS].forEach(f=>f.colors.forEach(c=>{
    const p=getInv(f.name,c,'petal');
    if(p<100) low.push({name:f.name,color:c,petal:p});
  }));
  return low;
}

function renderAlert(){
  const low=getLowItems();
  // Build map: flowerName -> [low colors]
  const lowMap={};
  low.forEach(l=>{
    if(!lowMap[l.name]) lowMap[l.name]=[];
    lowMap[l.name].push({color:l.color,petal:l.petal});
  });
  const box=document.getElementById('alert-items');
  const tags=[];
  // Low flowers first (with color dots), then rest
  const allFL=[...customFlowers,...FLOWERS];
  const lowFlowers=allFL.filter(f=>lowMap[f.name]);
  const okFlowers=allFL.filter(f=>!lowMap[f.name]);
  lowFlowers.forEach(f=>{
    const dots=lowMap[f.name].map(l=>`<span class="alert-dot ${COLOR_CLS[l.color]}" style="border:2px solid rgba(0,0,0,0.1);"></span>`).join('');
    // Use first low color for scroll target
    const firstColor=lowMap[f.name][0].color;
    tags.push(`<span class="alert-tag" onclick="scrollToFlower('${f.name}','${firstColor}')" style="cursor:pointer;">
      ${f.name} ${dots}
    </span>`);
  });
  okFlowers.forEach(f=>{
    tags.push(`<span class="alert-tag" onclick="scrollToFlower('${f.name}','${f.colors[0]}')" style="cursor:pointer;opacity:0.7;">
      ${f.name}
    </span>`);
  });
  box.innerHTML=tags.join('');
}


let customFlowers=JSON.parse(localStorage.getItem('pikmin_custom_flowers')||'null');
if(!customFlowers){customFlowers=[];saveCustom();}
function saveCustom(){ localStorage.setItem('pikmin_custom_flowers',JSON.stringify(customFlowers)); }

function renderInv(){
  const query=document.getElementById('inv-search').value.trim();
  const list=document.getElementById('inv-list');
  list.innerHTML='';
  const allFlowers=[...customFlowers,...FLOWERS];
  const filtered=query?allFlowers.filter(f=>f.name.includes(query)):allFlowers;
  const sorted=[...filtered].sort((a,b)=>{
    const hasLowA=a.colors.some(col=>getInv(a.name,col,'petal')<100);
    const hasLowB=b.colors.some(col=>getInv(b.name,col,'petal')<100);
    if(hasLowA&&!hasLowB) return -1;
    if(!hasLowA&&hasLowB) return 1;
    return 0;
  });
  sorted.forEach(f=>{
    const block=document.createElement('div');
    block.className='styleB-block';
    const colorCards=f.colors.map(col=>{
      const n=getInv(f.name,col,'nectar'), p=getInv(f.name,col,'petal');
      const editedAt=inv[`${f.name}_${col}_edited`]||0;
      const recentlyEdited=editedAt&&(Date.now()-editedAt)<168*60*60*1000;
      const borderCls='border-'+col;
      const fillCls=recentlyEdited?'fill-'+col:'';
      const card=`<div class="styleB-color-card ${borderCls} ${fillCls}" onclick="openInvEdit('${f.name}','${col}')">
        <div class="styleB-nums">
          <div class="styleB-num-row"><span class="styleB-num-type">精華</span><span class="styleB-num">${n}</span></div>
          <div class="styleB-num-row"><span class="styleB-num-type">花瓣</span><span class="styleB-num${p<100?' low':''}">${p}</span></div>
        </div>
      </div>`;
      return card;
    }).join('');
    block.id='flower-'+f.name;
    const isCustom=customFlowers.some(cf=>cf.name===f.name);
    const nameStyle=isCustom?'cursor:pointer;text-decoration:underline dotted #b8d8c4;text-underline-offset:3px;':'';
    const nameClick=isCustom?`onclick="openEditFlower('${f.name}')"`:'';
    block.innerHTML=`<div class="styleB-row"><div class="styleB-name" ${nameClick} style="${nameStyle}">${f.name}</div><div class="styleB-colors">${colorCards}</div></div>`;
    list.appendChild(block);
  });
}

function scrollToFlower(name,color){
  switchTab('inv');
  setTimeout(()=>{
    const el=document.getElementById('flower-'+name);
    if(el){
      el.scrollIntoView({behavior:'smooth',block:'center'});
      setTimeout(()=>{ el.classList.add('flash'); setTimeout(()=>el.classList.remove('flash'),1600); },400);
    }

  },100);
}

function openInvEdit(name,color){
  invEditing={name,color};
  const colorLabel=color==='white'?'白':color==='yellow'?'黃':color==='red'?'紅':'藍';
  document.getElementById('inv-modal-title').textContent='';
  document.getElementById('inv-modal-flower-name').textContent=name;
  document.getElementById('inv-modal-dot').className=`inv-edit-dot ${COLOR_CLS[color]}`;
  document.getElementById('inv-nectar-input').value=getInv(name,color,'nectar')||'';
  document.getElementById('inv-petal-input').value=getInv(name,color,'petal')||'';
  document.getElementById('inv-modal').style.display='flex';
  setTimeout(()=>document.getElementById('inv-nectar-input').focus(),80);
}
function confirmInvEdit(){
  if(!invEditing) return;
  const {name,color}=invEditing;
  setInvVal(name,color,'nectar',parseInt(document.getElementById('inv-nectar-input').value));
  setInvVal(name,color,'petal',parseInt(document.getElementById('inv-petal-input').value));
  renderAlert(); renderInv(); closeModal('inv-modal');
}

function openSeedImg(e,id){
  e.stopPropagation();
  const item=items.find(i=>i.id===id); if(!item) return;
  const overlay=document.createElement('div');
  overlay.className='seed-img-overlay';
  overlay.onclick=()=>overlay.remove();
  const box=document.createElement('div');
  box.className='seed-img-box';
  box.onclick=e=>e.stopPropagation();
  if(item.seedImg){
    const img=document.createElement('img');
    img.src=item.seedImg;
    box.appendChild(img);
  }
  const btnRow=document.createElement('div');
  btnRow.style.cssText='display:flex;gap:8px;justify-content:center;';
  const uploadBtn=document.createElement('button');
  uploadBtn.className='btn-action btn-start';
  uploadBtn.style.cssText='border-radius:50px;padding:7px 20px;font-size:0.78rem;font-weight:900;font-family:Nunito,sans-serif;background:var(--green);color:#fff;border:none;cursor:pointer;display:block;margin:0 auto;';
  uploadBtn.textContent=item.seedImg?'更換':'＋ 上傳';
  uploadBtn.onclick=()=>{
    const input=document.createElement('input');
    input.type='file'; input.accept='image/*';
    input.onchange=e=>{
      const file=e.target.files[0]; if(!file) return;
      const reader=new FileReader();
      reader.onload=ev=>{
        const img=new Image();
        img.onload=()=>{
          const MAX=800;
          let w=img.width, h=img.height;
          if(w>MAX||h>MAX){
            if(w>h){ h=Math.round(h*MAX/w); w=MAX; }
            else { w=Math.round(w*MAX/h); h=MAX; }
          }
          const canvas=document.createElement('canvas');
          canvas.width=w; canvas.height=h;
          canvas.getContext('2d').drawImage(img,0,0,w,h);
          item.seedImg=canvas.toDataURL('image/jpeg',0.7);
          save(); overlay.remove(); renderAll();
        };
        img.src=ev.target.result;
      };
      reader.readAsDataURL(file);
    };
    input.click();
  };
  btnRow.appendChild(uploadBtn);
  if(item.seedImg){
    const delBtn=document.createElement('button');
    delBtn.className='btn-action btn-end';
    delBtn.style.cssText='border-radius:50px;padding:7px 16px;font-size:0.75rem;font-weight:900;font-family:Nunito,sans-serif;background:#f0f4f1;color:#8aaa96;border:2px solid #d4e0d8;cursor:pointer;';
    delBtn.textContent='刪除';
    delBtn.onclick=()=>{ item.seedImg=null; save(); overlay.remove(); renderAll(); };
    btnRow.appendChild(delBtn);
  }

  box.appendChild(btnRow);
  overlay.appendChild(box);
  document.body.appendChild(overlay);
}

async function analyzeCoord(){
  const raw=document.getElementById('coord-input').value.trim();
  const match=raw.match(/(-?\d+\.?\d*)[,\s]+(-?\d+\.?\d*)/);
  if(!match){ alert('請輸入有效座標，例：23.9769, 121.6044'); return; }
  const lat=parseFloat(match[1]), lng=parseFloat(match[2]);

  document.getElementById('coord-result').style.display='none';
  document.getElementById('coord-loading').style.display='block';

  try{
    // 1. Reverse geocode with OpenStreetMap Nominatim
    const geoRes=await fetch(
      `https://nominatim.openstreetmap.org/reverse?lat=${lat}&lon=${lng}&format=json&accept-language=zh-TW`,
      {headers:{'User-Agent':'PikminHelper/1.0 (personal use)'}}
    );
    const geo=await geoRes.json();

    // 2. Get timezone from timeapi.io
    const tzRes=await fetch(`https://timeapi.io/api/timezone/coordinate?latitude=${lat}&longitude=${lng}`);
    const tz=await tzRes.json();

    // Build result
    const addr=geo.display_name||'未知地點';
    const country=geo.address&&geo.address.country||'';
    const city=geo.address&&(geo.address.city||geo.address.town||geo.address.county||geo.address.state)||'';
    const tzName=tz.timeZone||'未知時區';
    const localTime=tz.currentLocalTime?tz.currentLocalTime.replace('T',' ').slice(0,16):'未知';
    let utcOffset='';
    if(tz.currentUtcOffset!==undefined){
      // Handle both number and object formats
      if(typeof tz.currentUtcOffset==='number'){
        const h=Math.floor(tz.currentUtcOffset);
        const m=Math.round((Math.abs(tz.currentUtcOffset)-Math.abs(h))*60);
        utcOffset=(h>=0?'+':'')+h+(m>0?':'+String(m).padStart(2,'0'):'');
      } else if(tz.currentUtcOffset&&tz.currentUtcOffset.hours!==undefined){
        const h=tz.currentUtcOffset.hours;
        const m=Math.abs(tz.currentUtcOffset.minutes||0);
        utcOffset=(h>=0?'+':'')+h+(m>0?':'+String(m).padStart(2,'0'):'');
      }
    } else if(tz.utcOffset!==undefined){
      const h=Math.floor(tz.utcOffset/60);
      const m=Math.abs(tz.utcOffset%60);
      utcOffset=(h>=0?'+':'')+h+(m>0?':'+String(m).padStart(2,'0'):'');
    }

    const row=(label,val)=>`<div style="display:flex;justify-content:space-between;align-items:center;padding:6px 0;border-bottom:1px solid #edf0ec;font-size:0.85rem;"><span style="color:var(--sub);">${label}</span><span style="font-weight:700;text-align:right;max-width:65%;">${val}</span></div>`;
    const resultEl=document.getElementById('coord-result-text');
    resultEl.innerHTML=
      row('地理位置', (city?city+'，':'')+country) +
      row('當地時間', localTime);
    document.getElementById('coord-result').style.display='block';
  } catch(e){
    document.getElementById('coord-result-text').innerHTML=`<div style="color:var(--pink-dark);">分析失敗：${e.message}</div>`;
    document.getElementById('coord-result').style.display='block';
  }
  document.getElementById('coord-loading').style.display='none';
}


async function pasteCoord(){
  const input=document.getElementById('coord-input');
  try{
    const text=await navigator.clipboard.readText();
    input.value=text;
  } catch(e){
    input.focus();
    input.select();
    document.execCommand('paste');
  }
}

let afColors=[];
let efColors=[], efName='', efIsCustom=false, efDeleteClicks=0, efDeleteTimer=null;

function openAddFlower(){
  afColors=[];
  document.getElementById('new-flower-name').value='';
  ['white','yellow','red','blue'].forEach(col=>{
    document.getElementById('af-'+col).classList.remove('selected');
  });
  document.getElementById('add-flower-modal').style.display='flex';
  setTimeout(()=>document.getElementById('new-flower-name').focus(),80);
}

function toggleAFColor(col){
  const el=document.getElementById('af-'+col);
  if(afColors.includes(col)){
    afColors=afColors.filter(c=>c!==col);
    el.classList.remove('selected');
  } else {
    afColors.push(col);
    el.classList.add('selected');
  }
}

function confirmAddFlower(){
  const name=document.getElementById('new-flower-name').value.trim();
  if(!name){ alert('請輸入花種名稱'); return; }
  if(afColors.length===0){ alert('請至少選一個顏色'); return; }
  const order=['white','yellow','red','blue'];
  const colors=order.filter(c=>afColors.includes(c));
  customFlowers.unshift({name,colors});
  saveCustom(); closeModal('add-flower-modal'); renderInv();
}

function openEditFlower(name){
  const all=[...FLOWERS,...customFlowers];
  const flower=all.find(f=>f.name===name);
  if(!flower) return;
  efName=name;
  efIsCustom=customFlowers.some(f=>f.name===name);
  efColors=[...flower.colors];
  efDeleteClicks=0;
  document.getElementById('ef-name').value=name;
  ['white','yellow','red','blue'].forEach(col=>{
    const el=document.getElementById('ef-'+col);
    el.classList.toggle('selected', efColors.includes(col));
  });
  const delBtn=document.getElementById('ef-del-btn');
  delBtn.style.display=efIsCustom?'':'none';
  delBtn.textContent='刪除';
  delBtn.style.background='';
  delBtn.style.color='';
  document.getElementById('edit-flower-modal').style.display='flex';
  setTimeout(()=>document.getElementById('ef-name').focus(),80);
}

function toggleEFColor(col){
  const el=document.getElementById('ef-'+col);
  if(efColors.includes(col)){
    efColors=efColors.filter(c=>c!==col);
    el.classList.remove('selected');
  } else {
    efColors.push(col);
    el.classList.add('selected');
  }
}

function confirmEditFlower(){
  const name=document.getElementById('ef-name').value.trim();
  if(!name||efColors.length===0){ alert('請填寫名稱並選至少一個顏色'); return; }
  const order=['white','yellow','red','blue'];
  const colors=order.filter(c=>efColors.includes(c));
  if(efIsCustom){
    const idx=customFlowers.findIndex(f=>f.name===efName);
    if(idx>-1) customFlowers[idx]={name,colors};
    saveCustom();
  } else {
    const idx=FLOWERS.findIndex(f=>f.name===efName);
    if(idx>-1) FLOWERS[idx]={name,colors};
  }
  closeModal('edit-flower-modal'); renderInv();
}

function deleteCustomFlower(){
  const btn=document.getElementById('ef-del-btn');
  if(efDeleteClicks===0){
    efDeleteClicks=1;
    btn.textContent='刪除';
    btn.style.background='var(--pink-dark)';
    btn.style.color='#fff';
    efDeleteTimer=setTimeout(()=>{
      efDeleteClicks=0;
      btn.textContent='刪除';
      btn.style.background='';
      btn.style.color='';
    },2500);
  } else {
    clearTimeout(efDeleteTimer);
    customFlowers=customFlowers.filter(f=>f.name!==efName);
    saveCustom(); closeModal('edit-flower-modal'); renderInv();
  }
}

function exportData(){
  const data={
    items: items,
    inv: inv,
    customFlowers: customFlowers
  };
  const json=JSON.stringify(data, null, 2);
  const blob=new Blob([json],{type:'application/json'});
  const url=URL.createObjectURL(blob);
  const a=document.createElement('a');
  const now=new Date();
  const dateStr=`${now.getFullYear()}${String(now.getMonth()+1).padStart(2,'0')}${String(now.getDate()).padStart(2,'0')}`;
  a.href=url; a.download=`皮克敏備份_${dateStr}.json`;
  a.click(); URL.revokeObjectURL(url);
}

function importData(e){
  const file=e.target.files[0]; if(!file) return;
  const reader=new FileReader();
  reader.onload=ev=>{
    try{
      const data=JSON.parse(ev.target.result);
      if(data.items) { items=data.items; save(); }
      if(data.inv) { inv=data.inv; saveInv(); }
      if(data.customFlowers) { customFlowers=data.customFlowers; saveCustom(); }
      renderAll(); renderAlert(); renderInv();
      alert('匯入成功！');
    } catch(err){
      alert('匯入失敗，請確認檔案格式正確');
    }
    e.target.value='';
  };
  reader.readAsText(file);
}
